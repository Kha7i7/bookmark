<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title th:text="${bookmark.title} + ' - 详情'">书签详情</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<div id="bookmark-data"
     th:data-id="${bookmark.id}"
     th:data-title="${bookmark.title}"
     th:data-url="${bookmark.url}"
     th:data-description="${bookmark.description}"
     th:data-tags="${bookmark.tags}"
     style="display: none;"></div>

<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
  <div class="container-fluid">
    <a class="navbar-brand" th:href="@{/bookmark/list}">
      <strong>📚 在线书签收藏夹</strong>
    </a>
    <div class="navbar-nav ms-auto">
      <a class="btn btn-outline-primary btn-sm" th:href="@{/bookmark/list}">返回列表</a>
    </div>
  </div>
</nav>

<div class="container mt-4">
  <div class="card">
    <div class="card-header">
      <h3 th:text="${bookmark.title}"></h3>
    </div>
    <div class="card-body">
      <div class="mb-3">
        <h5>网址：</h5>
        <a th:href="${bookmark.url}" target="_blank" th:text="${bookmark.url}"></a>
      </div>
      <div class="mb-3" th:if="${!#strings.isEmpty(bookmark.description)}">
        <h5>描述：</h5>
        <p th:text="${bookmark.description}"></p>
      </div>
      <div class="mb-3" th:if="${!#strings.isEmpty(bookmark.tags)}">
        <h5>标签：</h5>
        <span class="tag" th:each="tag : ${#strings.arraySplit(bookmark.tags, ',')}"
              th:if="${!#strings.isEmpty(tag)}"
              th:text="${tag}"></span>
      </div>
      <div class="mb-3">
        <h5>创建时间：</h5>
        <p th:text="${#temporals.format(bookmark.createTime, 'yyyy-MM-dd HH:mm:ss')}"></p>
      </div>
      <div class="mb-3">
        <h5>更新时间：</h5>
        <p th:text="${#temporals.format(bookmark.updateTime, 'yyyy-MM-dd HH:mm:ss')}"></p>
      </div>
    </div>
    <div class="card-footer">
      <button class="btn btn-outline-primary" th:onclick="'editBookmark(' + ${bookmark.id} + ')'">编辑</button>
      <button class="btn btn-outline-danger" th:onclick="'deleteBookmark(' + ${bookmark.id} + ')'">删除</button>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
