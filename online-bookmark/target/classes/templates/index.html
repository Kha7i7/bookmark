<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>我的书签 - 在线书签收藏夹</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<!-- 导航栏 -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
  <div class="container-fluid">
    <a class="navbar-brand" th:href="@{/bookmark/list}">
      <strong>📚 在线书签收藏夹</strong>
    </a>
    <div class="navbar-nav ms-auto">
      <span class="navbar-text me-3" th:text="'欢迎，' + ${currentUser.username}"></span>
      <a class="btn btn-outline-primary btn-sm" th:href="@{/user/logout}">注销</a>
    </div>
  </div>
</nav>

<div class="container mt-4">
  <!-- 搜索框 -->
  <div class="search-box">
    <form th:action="@{/bookmark/search}" method="get" class="input-group">
      <input type="text" name="keyword" class="form-control" placeholder="搜索书签标题、描述或标签..." required>
      <button class="btn btn-primary" type="submit">搜索</button>
    </form>
  </div>

  <!-- 添加书签按钮 -->
  <div class="d-flex justify-content-between align-items-center mb-3">
    <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addModal">
      + 添加新书签
    </button>

    <!-- 标签筛选 -->
    <div class="tag-cloud">
      <span class="fw-bold me-2">标签筛选：</span>
      <a class="tag" th:href="@{/bookmark/list}">全部</a>
      <a class="tag" th:each="tag : ${tags}"
         th:href="@{/bookmark/tag/{tag}(tag=${tag})}"
         th:text="${tag}"></a>
    </div>
  </div>

  <!-- 书签列表 -->
  <div class="row">
    <div class="col-md-6 col-lg-4 mb-3" th:each="bookmark : ${page.records}">
      <div class="card h-100">
        <div class="card-body">
          <h5 class="card-title">
            <a th:href="${bookmark.url}" target="_blank" th:text="${bookmark.title}"></a>
          </h5>
          <p class="card-text text-muted" th:text="${bookmark.description}"></p>
          <div class="mb-2">
                            <span class="tag" th:each="tag : ${#strings.arraySplit(bookmark.tags, ',')}"
                                  th:if="${!#strings.isEmpty(tag)}"
                                  th:text="${tag}"></span>
          </div>
          <small class="text-muted" th:text="'创建于：' + ${#temporals.format(bookmark.createTime, 'yyyy-MM-dd HH:mm')}"></small>
        </div>
        <div class="card-footer bg-transparent">
          <button class="btn btn-sm btn-outline-primary" th:onclick="'editBookmark(' + ${bookmark.id} + ')'">编辑</button>
          <button class="btn btn-sm btn-outline-danger" th:onclick="'deleteBookmark(' + ${bookmark.id} + ')'">删除</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 分页 -->
  <div class="mt-4" th:if="${page.total > 0}">
    <div class="d-flex justify-content-center align-items-center">
      <span class="me-3">每页</span>
      <select id="pageSizeSelect" class="form-select form-select-sm" style="width: auto;" onchange="changePageSize()">
        <option value="10" th:selected="${page.size == 10}">10条</option>
        <option value="20" th:selected="${page.size == 20}">20条</option>
        <option value="50" th:selected="${page.size == 50}">50条</option>
      </select>
      <span class="ms-3 me-3">条，共 <span th:text="${page.total}"></span> 条</span>
    </div>

    <nav aria-label="Page navigation">
      <ul class="pagination">
        <li class="page-item" th:classappend="${!page.hasPrevious()} ? 'disabled'">
          <a class="page-link" th:href="@{/bookmark/list(pageNum=${page.current - 1}, pageSize=${page.size})}">上一页</a>
        </li>
        <li class="page-item" th:each="i : ${#numbers.sequence(1, page.pages)}"
            th:classappend="${i == page.current} ? 'active'">
          <a class="page-link" th:href="@{/bookmark/list(pageNum=${i}, pageSize=${page.size})}" th:text="${i}"></a>
        </li>
        <li class="page-item" th:classappend="${!page.hasNext()} ? 'disabled'">
          <a class="page-link" th:href="@{/bookmark/list(pageNum=${page.current + 1}, pageSize=${page.size})}">下一页</a>
        </li>
      </ul>
    </nav>
  </div>
</div>

<!-- 添加书签模态框 -->
<div class="modal fade" id="addModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">添加新书签</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="addForm">
          <div class="mb-3">
            <label class="form-label">标题 *</label>
            <input type="text" class="form-control" id="title" name="title" required>
          </div>
          <div class="mb-3">
            <label class="form-label">网址 *</label>
            <input type="url" class="form-control" id="url" name="url" required>
          </div>
          <div class="mb-3">
            <label class="form-label">描述</label>
            <textarea class="form-control" id="description" name="description" rows="3"></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label">标签（用逗号分隔）</label>
            <input type="text" class="form-control" id="tags" name="tags"
                   placeholder="例如：编程,Java,Web开发">
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
        <button type="button" class="btn btn-primary" onclick="addBookmark()">保存</button>
      </div>
    </div>
  </div>
</div>

<!-- 编辑书签模态框 -->
<div class="modal fade" id="editModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">编辑书签</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="editForm">
          <input type="hidden" id="edit-id" name="id">
          <div class="mb-3">
            <label class="form-label">标题 *</label>
            <input type="text" class="form-control" id="edit-title" name="title" required>
          </div>
          <div class="mb-3">
            <label class="form-label">网址 *</label>
            <input type="url" class="form-control" id="edit-url" name="url" required>
          </div>
          <div class="mb-3">
            <label class="form-label">描述</label>
            <textarea class="form-control" id="edit-description" name="description" rows="3"></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label">标签（用逗号分隔）</label>
            <input type="text" class="form-control" id="edit-tags" name="tags">
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
        <button type="button" class="btn btn-primary" onclick="saveEdit()">保存</button>
      </div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
